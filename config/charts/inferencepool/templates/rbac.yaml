apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-non-sa" (include "llm-d-inference-scheduler.name" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-d-inference-scheduler.labels" . | nindent 4 }}
rules:
- apiGroups: ["inference.networking.x-k8s.io"]
  resources: ["inferenceobjectives", "inferencemodelrewrites"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["inference.networking.k8s.io"]
  resources: ["inferencepools"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-non-sa" (include "llm-d-inference-scheduler.name" .) }}
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "llm-d-inference-scheduler.name" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-non-sa" (include "llm-d-inference-scheduler.name" .) }}
---
{{- include "inference-extension.rbac" . -}}
