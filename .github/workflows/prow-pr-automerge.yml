# Merges PRs with the lgtm label. Blocks if hold label is present.

name: "Prow merge on lgtm label"
on:
  pull_request:
    types: [labeled]
  schedule:
  - cron: "*/10 * * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: jpmcb/prow-github-actions@v2.0.0
        with:
          jobs: 'lgtm'
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          merge-method: 'squash'
