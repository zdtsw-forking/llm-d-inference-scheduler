version: 2
updates:

  # 1. Go module updates
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(go)"
    labels:
      - "dependencies"
      - "release-note-none"
    ignore:
      # Major/minor upgrades are handled intentionally via `make upgrade-deps`; dependabot covers patches only
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # GAIE is updated manually only (all versions)
      - dependency-name: "sigs.k8s.io/gateway-api-inference-extension"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
    groups:
      go-dependencies:
        patterns:
          - "*"
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"

  # 2. GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "release-note-none"
    commit-message:
      prefix: "deps(actions)"
    # No "ignore" block here: This allows major version updates
    groups:
      github-actions:
        patterns:
          - "*"

  # 3. Docker base image updates
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps(docker)"
