apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: ${POOL_NAME}
spec:
  selector:
    matchLabels:
      app: ${POOL_NAME}
  endpointPickerRef:
    name: ${EPP_NAME}
    kind: Service
    port:
      number: 9002
  # TARGET_PORTS is a pre-formatted YAML block-sequence fragment produced by
  # kind-dev-env.sh / e2e setup. It begins with a newline and carries its own
  # "  - number: <port>" lines at this indentation level, e.g.:
  #   - number: 8000
  #   - number: 8001
  # If you reindent this field, update the TARGET_PORTS builder in
  # scripts/kind-dev-env.sh and test/e2e/e2e_suite_test.go to match.
  targetPorts: ${TARGET_PORTS}
