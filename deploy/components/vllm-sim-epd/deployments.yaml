apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-sim-e
  labels:
    app: ${POOL_NAME}
spec:
  replicas: ${VLLM_REPLICA_COUNT_E}
  selector:
    matchLabels:
      app: ${POOL_NAME}
  template:
    metadata:
      labels:
        app: ${POOL_NAME}
        llm-d.ai/role: encode
    spec:
      initContainers:
      - name: uds-tokenizer
        image: ${UDS_TOKENIZER_IMAGE}
        imagePullPolicy: IfNotPresent
        restartPolicy: Always
        env:
        - name: LOG_LEVEL
          value: "DEBUG"
        - name: PROBE_PORT
          value: "8082"
        - name: HF_TOKEN
          value: "${HF_TOKEN}"
        ports:
        - name: health
          containerPort: 8082
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: uds-socket
          mountPath: /tmp/tokenizer
      containers:
      - name: vllm
        image: ${VLLM_SIMULATOR_IMAGE}
        imagePullPolicy: IfNotPresent
        args:
        - "--model=${MODEL_NAME}"
        - "--port=8000"
        - "--data-parallel-size=${VLLM_DATA_PARALLEL_SIZE}"
        - "--no-enable-prefix-caching"
        - "--mm-encoder-only"
        ports:
        - name: encode-http
          containerPort: 8000
          protocol: TCP
        - name: encode-rank1
          containerPort: 8001
          protocol: TCP
        - name: encode-rank2
          containerPort: 8002
          protocol: TCP
        - name: encode-rank3
          containerPort: 8003
          protocol: TCP
        - name: encode-rank4
          containerPort: 8004
          protocol: TCP
        - name: encode-rank5
          containerPort: 8005
          protocol: TCP
        - name: encode-rank6
          containerPort: 8006
          protocol: TCP
        - name: encode-rank7
          containerPort: 8007
          protocol: TCP
        env:
        - name: PORT
          value: "8000"
        volumeMounts:
        - name: uds-socket
          mountPath: /tmp/tokenizer
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      volumes:
      # Shared volume for Unix Domain Socket communication between the simulator and UDS tokenizer
      - name: uds-socket
        emptyDir: {}
---
