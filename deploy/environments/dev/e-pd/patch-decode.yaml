apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-d
spec:
  template:
    metadata:
      labels:
        llm-d.ai/role: prefill-decode
    spec:
      initContainers:
      - name: routing-sidecar
        args:
        - "--port=8000"
        - "--vllm-port=8200"
        - "--ec-connector=${EC_CONNECTOR_TYPE}"
        - "--secure-proxy=false"
        - "--data-parallel-size=${VLLM_DATA_PARALLEL_SIZE}"
