        - "--port=8000"
        - "--vllm-port=8200"
        - "--kv-connector=${KV_CONNECTOR_TYPE}"
        - "--ec-connector=${EC_CONNECTOR_TYPE}"
        - "--secure-proxy=false"
        ports:
        - containerPort: 8000
          protocol: TCP
        restartPolicy: Always
      containers:
      - name: vllm
        image: ${VLLM_SIMULATOR_IMAGE}
        imagePullPolicy: IfNotPresent
        args:
        - "--port=8200"
        - "--model=${MODEL_NAME}"
        - "--mode=echo"
        ports:
        - name: http
          containerPort: 8200
          protocol: TCP
        env:
        - name: PORT
          value: "8200"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        volumeMounts:
        - name: uds-socket
          mountPath: /tmp/tokenizer
      volumes:
      # Shared volume for Unix Domain Socket communication between the simulator and UDS tokenizer
      - name: uds-socket
        emptyDir: {}
